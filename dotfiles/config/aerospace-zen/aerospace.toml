# HACK: Zen-mode in AeroSpace. Remove when AeroSpace implements it.
# See https://github.com/nikitabobko/AeroSpace/discussions/2061
#
# This is a copy of aerospace.toml with modified outer gaps.
# Based on https://github.com/nikitabobko/AeroSpace/issues/60#issuecomment-3063386260
# AeroSpace should sooner or later support it natively.

start-at-login = true

default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

[gaps]

inner.horizontal = 10
inner.vertical = 10
outer.left = 316
outer.bottom = 10
outer.top = 10
outer.right = 316
